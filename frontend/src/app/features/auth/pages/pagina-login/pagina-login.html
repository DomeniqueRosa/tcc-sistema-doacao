<div class="container">
  <mat-card class="card">
    <mat-card-header>
      <mat-card-title>Login</mat-card-title>
      <mat-card-subtitle>Acesse o sistema com seu e-mail e senha</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="entrar()" class="formulario">
        <mat-form-field appearance="outline">
          <mat-label>E-mail</mat-label>
          <input matInput type="email" formControlName="email" />

          <mat-error *ngIf="campoTemErro('email', 'required')">
            O e-mail é obrigatório
          </mat-error>

          <mat-error *ngIf="campoTemErro('email', 'email')">
            Informe um e-mail válido
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Senha</mat-label>
          <input matInput type="password" formControlName="senha" />

          <mat-error *ngIf="campoTemErro('senha', 'required')">
            A senha é obrigatória
          </mat-error>
        </mat-form-field>

        <div class="acoes">
          <button
            mat-raised-button
            color="primary"
            type="submit"
            [disabled]="loginForm.invalid || carregando">
            {{ carregando ? 'Entrando...' : 'Entrar' }}
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
