<div class="modal-exclusao">

  <button class="botao-fechar" type="button" mat-dialog-close>
    <mat-icon>close</mat-icon>
  </button>

  <h2>Deseja excluir este perfil?</h2>

  <p>Essa ação será permanente!</p>

  <div class="acoes-modal">
    <button
      mat-raised-button
      type="button"
      class="botao-confirmar"
      [mat-dialog-close]="true">
      <mat-icon>check</mat-icon>
      Confirmar
    </button>

    <button
      mat-stroked-button
      type="button"
      class="botao-cancelar"
      mat-dialog-close>
      <mat-icon>close</mat-icon>
      Cancelar
    </button>
  </div>

</div>
