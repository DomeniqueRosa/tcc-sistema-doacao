<div class="dashboard-container">
  <section class="boas-vindas">
    <h1>Bem-vindo, {{ nomeUsuario }}!</h1>
  </section>

  <section class="cards-resumo">
    <mat-card class="card-resumo">
      <mat-card-content>
        <h3>Doações</h3>
        <p>{{ totalDoacoes }}</p>
      </mat-card-content>
    </mat-card>

    <mat-card class="card-resumo">
      <mat-card-content>
        <h3>Aprovadas</h3>
        <p>{{ totalAprovadas }}</p>
      </mat-card-content>
    </mat-card>

    <mat-card class="card-resumo">
      <mat-card-content>
        <h3>Reprovadas</h3>
        <p>{{ totalReprovadas }}</p>
      </mat-card-content>
    </mat-card>

    <mat-card class="card-resumo">
      <mat-card-content>
        <h3>Em reparo</h3>
        <p>{{ totalEmReparo }}</p>
      </mat-card-content>
    </mat-card>
  </section>

  <section class="charts-grid">
    <mat-card class="chart-card">
      <mat-card-content>
        <apx-chart
          #donutChart
          [series]="donutChartOptions.series"
          [chart]="donutChartOptions.chart"
          [labels]="donutChartOptions.labels"
          [responsive]="donutChartOptions.responsive"
          [legend]="donutChartOptions.legend"
          [dataLabels]="donutChartOptions.dataLabels"
          [stroke]="donutChartOptions.stroke"
          [title]="donutChartOptions.title">
        </apx-chart>
      </mat-card-content>
    </mat-card>

    <mat-card class="chart-card">
      <mat-card-content>
        <apx-chart
          #barChart
          [series]="barChartOptions.series"
          [chart]="barChartOptions.chart"
          [xaxis]="barChartOptions.xaxis"
          [yaxis]="barChartOptions.yaxis"
          [dataLabels]="barChartOptions.dataLabels"
          [plotOptions]="barChartOptions.plotOptions"
          [title]="barChartOptions.title">
        </apx-chart>
      </mat-card-content>
    </mat-card>
  </section>
</div>
