<div class="container">
  <mat-card class="card">
    <mat-card-header>
      <mat-card-title>Bem-Vindo</mat-card-title>
      <mat-card-subtitle>Preencha os dados para criar sua conta</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="cadastroForm" (ngSubmit)="salvar()" class="formulario">
        <mat-form-field appearance="outline">
          <mat-label>Nome</mat-label>
          <input matInput formControlName="nome" type="text" />
          <mat-error *ngIf="campoTemErro('nome', 'required')">
            O nome é obrigatório
          </mat-error>
          <mat-error *ngIf="campoTemErro('nome', 'minlength')">
            O nome deve ter pelo menos 3 caracteres
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>CPF</mat-label>
          <input matInput formControlName="cpf" type="text" />
          <mat-error *ngIf="campoTemErro('cpf', 'required')">
            O CPF é obrigatório
          </mat-error>
          <mat-error *ngIf="campoTemErro('cpf', 'minlength') || campoTemErro('cpf', 'maxlength')">
            O CPF deve ter 11 dígitos
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>E-mail</mat-label>
          <input matInput formControlName="email" type="email" />
          <mat-error *ngIf="campoTemErro('email', 'required')">
            O e-mail é obrigatório
          </mat-error>
          <mat-error *ngIf="campoTemErro('email', 'email')">
            Informe um e-mail válido
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Senha</mat-label>
          <input matInput formControlName="senha" type="password" />
          <mat-error *ngIf="campoTemErro('senha', 'required')">
            A senha é obrigatória
          </mat-error>
          <mat-error *ngIf="campoTemErro('senha', 'minlength')">
            A senha deve ter pelo menos 6 caracteres
          </mat-error>
        </mat-form-field>

        <div class="acoes">
          <button
            mat-raised-button
            color="primary"
            type="submit"
            [disabled]="cadastroForm.invalid || carregando">
            {{ carregando ? 'Cadastrando...' : 'Cadastrar' }}
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
