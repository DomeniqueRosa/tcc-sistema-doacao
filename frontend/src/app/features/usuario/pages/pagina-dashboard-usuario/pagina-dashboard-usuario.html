<div class="dashboard-container">
  <section class="boas-vindas">
    <h1>Bem-vindo, {{ nomeUsuario }}!</h1>
  </section>

  <section class="cards-resumo">
    <mat-card class="card-resumo">
      <mat-card-content>
        <h3>Doações</h3>
        <p>{{ totalDoacoes }}</p>
      </mat-card-content>
    </mat-card>

    <mat-card class="card-resumo">
      <mat-card-content>
        <h3>Alunos Beneficiados</h3>
        <p>{{ totalAlunosBeneficiados }}</p>
      </mat-card-content>
    </mat-card>
  </section>

  <section class="charts-grid">
    <mat-card class="chart-card">
      <mat-card-content>
        <apx-chart
          [series]="donutChartOptions.series"
          [chart]="donutChartOptions.chart"
          [labels]="donutChartOptions.labels">
        </apx-chart>
      </mat-card-content>
    </mat-card>

    <mat-card class="chart-card">
      <mat-card-content>
        <apx-chart
          [series]="barChartOptions.series"
          [chart]="barChartOptions.chart"
          [xaxis]="barChartOptions.xaxis">
        </apx-chart>
      </mat-card-content>
    </mat-card>
  </section>
</div>
