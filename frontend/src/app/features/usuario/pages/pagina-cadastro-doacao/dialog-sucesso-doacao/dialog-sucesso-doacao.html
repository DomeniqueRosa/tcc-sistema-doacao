<div class="modal-sucesso">

  <div class="faixa-topo"></div>

  <div class="conteudo-modal">
    <div class="icone-status">
      <mat-icon>check_circle</mat-icon>
    </div>

    <div class="textos">
      <h2>Doação enviada com sucesso!</h2>
      <p>
        Sua doação foi registrada no sistema e agora está aguardando análise.
        Acompanhe o status nas suas doações cadastradas.
      </p>
    </div>

    <div class="acoes-modal">
      <button mat-raised-button color="primary" type="button" (click)="fechar()">
        Entendi
      </button>
    </div>
  </div>
</div>
